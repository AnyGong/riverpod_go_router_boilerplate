name: Flutter CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # ANALYZE & TEST
  # Runs on all branches and pull requests
  # ─────────────────────────────────────────────────────────────────────────────
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code generation is up-to-date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code lib/ || (echo "::error::Generated files are out of date. Run 'dart run build_runner build' and commit the changes." && exit 1)

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD RELEASE APK (main branch only)
  # Builds release APK and publishes as GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/riverpod-boilerplate-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}

            ### Changes
            - See [CHANGELOG.md](CHANGELOG.md) for details

            ### Assets
            - `riverpod-boilerplate-v${{ steps.version.outputs.version }}.apk` - Production release APK

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/...v${{ steps.version.outputs.version }}
          files: |
            build/app/outputs/flutter-apk/riverpod-boilerplate-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD DEBUG APK (develop branch only)
  # Builds debug APK and publishes as GitHub Pre-release
  # ─────────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Generate build number
        id: build
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          SHORT_SHA=${GITHUB_SHA::7}
          echo "number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Rename APK with version and build info
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/riverpod-boilerplate-v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}.apk

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}
          name: Pre-release v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}
          body: |
            ## 🧪 Pre-release v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}

            > ⚠️ **This is a development build for testing purposes only.**

            ### Build Info
            - **Branch**: `develop`
            - **Commit**: `${{ steps.build.outputs.sha }}`
            - **Build**: `${{ steps.build.outputs.number }}`

            ### Assets
            - `riverpod-boilerplate-v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}.apk` - Debug APK for testing

            ---
            **Note**: This build may contain experimental features and should not be used in production.
          files: |
            build/app/outputs/flutter-apk/riverpod-boilerplate-v${{ steps.version.outputs.version }}-dev.${{ steps.build.outputs.number }}.apk
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
